<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeowTI 喵格测试 - 最终交互版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        /* ================= 基础配置与背景 ================= */
        :root {
            --paper-bg: #FDFBF7; 
            --ink-black: #4a4848; 
            --crayon-red: #ff7878; 
            --crayon-blue: #7bb5d1; 
            --crayon-yellow: #fddb73;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body {
            background-color: var(--paper-bg);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
                radial-gradient(#e5e0d8 1px, transparent 1px);
            background-size: 30px 30px, 30px 30px, 15px 15px;
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            color: var(--ink-black); margin: 0; display: flex; justify-content: center;
            min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden;
        }

        .bg-decor { position: fixed; font-size: 30px; opacity: 0.15; z-index: 0; pointer-events: none; filter: sepia(0.5) hue-rotate(-10deg); }
        .decor-1 { top: 10%; left: 5%; animation: float 6s ease-in-out infinite; }
        .decor-2 { bottom: 20%; right: 5%; animation: float 8s ease-in-out infinite reverse; }
        .decor-3 { top: 40%; right: 10%; animation: float 7s ease-in-out infinite; transform: rotate(15deg); }
        .decor-4 { bottom: 10%; left: 15%; animation: float 5s ease-in-out infinite reverse; font-size: 40px; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }

        /* ================= 容器与屏幕切换 ================= */
        .notebook-container { width: 100%; max-width: 420px; min-height: 100vh; padding: 30px 20px 40px 20px; position: relative; z-index: 1; background: rgba(253, 251, 247, 0.7); backdrop-filter: blur(2px); scrollbar-width: none; }
        .notebook-container::-webkit-scrollbar { display: none; }
        .screen { display: none; animation: wobbleIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .screen.active { display: block; }
        @keyframes wobbleIn { 0% { opacity: 0; transform: translateY(15px) rotate(-2deg); } 100% { opacity: 1; transform: translateY(0) rotate(0); } }

        /* ================= 首页排版 ================= */
        .title-handwritten { font-size: 40px; text-align: center; margin-bottom: 25px; position: relative; display: inline-block; }
        .title-handwritten::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 8px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 10" preserveAspectRatio="none"><path d="M0,5 Q25,0 50,5 T100,5" fill="none" stroke="%23ff7878" stroke-width="3"/></svg>') repeat-x; background-size: 40px 10px; }
        
        /* ================= 答题页排版与动画 ================= */
        #quiz-anim-wrap { width: 100%; }
        .page-turn-out { animation: pageOut 0.3s forwards ease-in; }
        .page-turn-in { animation: pageIn 0.4s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pageOut { 0% { opacity: 1; transform: translateX(0) rotate(0deg); } 100% { opacity: 0; transform: translateX(-40px) rotate(-4deg); } }
        @keyframes pageIn { 0% { opacity: 0; transform: translateX(40px) rotate(4deg); } 100% { opacity: 1; transform: translateX(0) rotate(0deg); } }

        .progress-doodle { font-size: 16px; text-align: center; margin-bottom: 25px; color: var(--crayon-blue); border-bottom: 2px dashed #ddd; padding-bottom: 10px;}
        .question-text { font-size: 22px; line-height: 1.5; margin-bottom: 30px; font-weight: bold;}

        /* ================= 选项按钮样式 ================= */
        .btn-hand-drawn {
            display: block; width: 100%; padding: 16px 20px; margin-bottom: 16px;
            background-color: transparent; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            border: 3px solid var(--ink-black); cursor: pointer; font-family: inherit; font-size: 17px; 
            color: var(--ink-black); text-align: left; position: relative; transition: all 0.2s ease;
        }
        .btn-hand-drawn:active { transform: scale(0.96) rotate(-1deg); background-color: rgba(253, 219, 115, 0.3); }
        .btn-hand-drawn.selected { background-color: var(--crayon-yellow); transform: scale(0.98) rotate(1deg) !important; border-width: 4px; box-shadow: 2px 4px 0px rgba(0,0,0,0.1); }
        .btn-hand-drawn.selected::after { content: '🐾'; position: absolute; right: 15px; top: 50%; margin-top: -12px; font-size: 24px; animation: stamp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes stamp { 0% { opacity: 0; transform: scale(3) rotate(30deg); } 100% { opacity: 1; transform: scale(1) rotate(-15deg); } }

        .btn-primary-doodle { background-color: var(--crayon-red); color: white; text-align: center; border-color: var(--crayon-red); font-size: 20px; margin-top: 30px; transform: rotate(-1deg); box-shadow: 3px 3px 0px rgba(0,0,0,0.15); font-weight: bold;}
        .btn-primary-doodle:active { background-color: #e56060; transform: scale(0.95) rotate(1deg) !important; box-shadow: 1px 1px 0px rgba(0,0,0,0.15);}

        /* ================= 新增：底部动作栏 ================= */
        .action-bar { display: flex; justify-content: space-between; margin-top: 40px; }
        .spacer { flex: 1; }
        .action-btn { margin: 0; padding: 12px 15px; font-size: 15px; border: 2px solid var(--ink-black); border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; background-color: var(--paper-bg); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s ease; font-family: inherit;}
        .back-btn { background-color: #f1f5f9; }
        .confirm-btn { background-color: var(--crayon-yellow); font-weight: bold; }
        .confirm-btn.disabled { opacity: 0.4; pointer-events: none; }
        .action-btn:active { transform: scale(0.95) rotate(-1deg); box-shadow: 0px 0px 0px rgba(0,0,0,0.1); }

        /* ================= 结果页 ================= */
        .polaroid-frame { background: white; padding: 12px 12px 30px 12px; box-shadow: 2px 5px 15px rgba(0,0,0,0.08); transform: rotate(2deg); margin-bottom: 30px; position: relative; }
        .washi-tape { position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg); width: 100px; height: 30px; background-color: rgba(123, 181, 209, 0.5); z-index: 10; border-left: 2px dotted rgba(255,255,255,0.5); border-right: 2px dotted rgba(255,255,255,0.5); }
        .final-cat-art { width: 100%; height: auto; display: none; border-radius: 8px; margin-bottom: 15px; background-color: #f9f8f6;}
        .art-placeholder { width: 100%; aspect-ratio: 1/1; background-color: #f9f8f6; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ddd; color: #aaa; margin-bottom: 15px; border-radius: 8px; }
        .meta-prefix { font-size: 18px; color: var(--crayon-blue); text-align: center; }
        .meta-breed { font-size: 38px; margin: 5px 0; color: var(--crayon-red); text-shadow: 2px 2px 0px rgba(0,0,0,0.05); text-align: center; font-weight: bold;}
        .doodle-box { border: 3px solid var(--ink-black); border-radius: 15px 225px 255px 15px/255px 15px 225px 15px; padding: 20px 15px; margin-bottom: 25px; background: rgba(255,255,255,0.7); position: relative; }
        .doodle-box::after { content: '🐟'; position: absolute; right: -5px; bottom: -15px; font-size: 26px; transform: rotate(-20deg); }
        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;}
        .tag-doodle { border: 2px solid var(--ink-black); padding: 5px 12px; border-radius: 20px; font-size: 14px; background: var(--paper-bg); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .tag-doodle:nth-child(odd) { transform: rotate(-2deg); background: var(--crayon-yellow); }
        .tag-doodle:nth-child(even) { transform: rotate(2deg); }
        .analysis-text { font-size: 16px; line-height: 1.7; color: #444; padding: 0 5px; text-align: justify; }
        
        /* ================= 加载动画 ================= */
        #loading-doodle { text-align: center; padding-top: 40%; font-size: 20px; }
        .cat-loading-anim { font-size: 45px; display: flex; justify-content: center; gap: 15px; margin-bottom: 15px;}
        .cat-run { animation: chase 1s infinite linear; }
        .yarn-roll { animation: roll 1s infinite linear; }
        @keyframes chase { 0% { transform: translateY(0); } 50% { transform: translateY(-12px) rotate(5deg); } 100% { transform: translateY(0); } }
        @keyframes roll { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(15px) rotate(180deg); } 100% { transform: translateX(0) rotate(360deg); } }
    </style>
</head>
<body>

<div class="bg-decor decor-1">🐾</div>
<div class="bg-decor decor-2">🧶</div>
<div class="bg-decor decor-3">🐟</div>
<div class="bg-decor decor-4">🐈</div>

<div class="notebook-container">
    
    <div id="screen-home" class="screen active" style="text-align: center; padding-top: 10%;">
        <img src="./home_cat.png" alt="首页猫咪" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; margin: 0 auto 20px auto; display: block; animation: float 4s infinite; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 class="title-handwritten">MeowTI<br>喵格测试</h1>
        <p style="font-size: 16px; margin-bottom: 40px; color: #888; font-weight: bold;">哪只小猫咪，画出了你的灵魂？</p>
        <button class="btn-hand-drawn btn-primary-doodle" onclick="startGame()">翻开日记本开始 🐾</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div id="quiz-anim-wrap">
            <div class="progress-doodle" id="progress-text">🐾 正在探索 1 / 15</div>
            <div class="question-text" id="question-content">题目加载中...</div>
            <div id="options-list"></div>

            <div class="action-bar" id="action-bar">
                <div class="spacer" id="spacer"></div>
                <button class="action-btn back-btn" id="back-btn" onclick="prevQuestion()" style="display: none;">🐈 溜回上一题</button>
                <button class="action-btn confirm-btn disabled" id="confirm-btn" onclick="confirmAnswer()">🐟 确定啦，喵！</button>
            </div>
        </div>
    </div>

    <div id="screen-loading" class="screen">
        <div id="loading-doodle">
            <div class="cat-loading-anim"><div class="cat-run">🐈</div><div class="yarn-roll">🧶</div></div>
            正在用蜡笔画出你的喵格...
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="polaroid-frame">
            <div class="washi-tape"></div> 
            <div class="art-placeholder" id="placeholder-box"><span style="font-size: 35px; margin-bottom: 10px;">🖌️</span>[ 美工作品展示区 ]</div>
            <img class="final-cat-art" id="cat-artwork" src="" alt="专属喵格">
            <div class="meta-prefix" id="res-prefix">称号加载中</div>
            <h1 class="meta-breed" id="res-breed">品种名</h1>
        </div>
        <div class="doodle-box">
            <div style="color: var(--crayon-red); font-size: 15px; margin-bottom: 8px; font-weight: bold;">「 喵言喵语 」</div>
            <p id="res-quote" style="font-size: 18px; font-weight: bold; margin: 0;">“金句加载中”</p>
        </div>
        <div class="tags-wrapper" id="res-tags"></div>
        <div class="analysis-text" id="res-analysis">解析文案加载中...</div>
        <button class="btn-hand-drawn btn-primary-doodle" onclick="location.reload()" style="margin-top: 35px;">再画一只 🖍️</button>
    </div>
</div>

<script>
    // 【请补齐 15 道题】
    const questions = [
        { q: "清晨，主人的闹钟响了但他没醒，你会：", a: [
            { t: "踩在他脸上，大声催他起来开饭", s: {E:2} },
            { t: "温柔地凑过去，舔舔他的鼻子", s: {E:1} },
            { t: "在旁边静静盯着他，等他自己醒", s: {I:1} },
            { t: "换个舒服的姿势继续睡，管他呢", s: {I:2} }
        ]},
        { q: "墙角突然闪过一个红色激光笔光点，你认为：", a: [
            { t: "猎物！身体已经本能地扑出去了！", s: {S:2} },
            { t: "是个好玩的玩具，先观察它的规律", s: {S:1} },
            { t: "哼，人类低级的把戏，配合一下吧", s: {N:1} },
            { t: "抓不住的光？这是存在与虚无的哲学", s: {N:2} }
        ]}
    ];

    const resultData = {
      "ISTJ": { breed: "中华狸花猫", imgName: "cat_ISTJ.jpg", prefix: "干饭第一名的", quote: "少废话，把今天的罐头交出来。", tags: ["务实机警", "拒绝内耗", "执行力爆表"], analysis: "狸花猫是天生的生存专家。你极其务实，有着自己严格的章法和节奏，做事利落，执行力爆表。" },
      "ISFJ": { breed: "异国短毛猫", imgName: "cat_ISFJ.jpg", prefix: "默默记住你喜好的", quote: "你没说，但我记得你上次提过。", tags: ["生日不会忘", "情绪极其稳定", "体贴细节控"], analysis: "你就像加菲猫一样憨厚呆萌，但骨子里是一部超级细致的人际记录仪，把照顾别人当成一种本能。" },
      "ESTJ": { breed: "东方短毛猫", imgName: "cat_ESTJ.jpg", prefix: "绝对掌控全局的", quote: "在这个家里，规矩由我来定。", tags: ["领地意识", "雷厉风行", "天生管理者"], analysis: "你是一个天生的管理者，做事雷厉风行，极度看重秩序和结果。总能把杂乱无章的事情安排得明明白白。" },
      "ESFJ": { breed: "美国短毛猫", imgName: "cat_ESFJ.jpg", prefix: "能和所有人打成一片的", quote: "新来的小狗？别怕，交给我来带！", tags: ["中央空调", "极度热心", "害怕被孤立"], analysis: "美短性格极其友善，能和所有人完美打成一片。你有着超强的亲和力与责任感，让大家感到开心是你最大的成就感。" },
      "ISTP": { breed: "挪威森林猫", imgName: "cat_ISTP.jpg", prefix: "身手极其矫健的", quote: "别管我，我自己在柜顶待会儿。", tags: ["绝对自由", "隐蔽极高", "行动派"], analysis: "你极其需要私人空间，讨厌被过度干涉。动手能力强，遇到危机时总是最冷静的那一个，喜欢用行动解决问题。" },
      "ISFP": { breed: "无毛猫", imgName: "cat_ISFP.jpg", prefix: "特立独行且迷人的", quote: "我只对认定的人露出肚皮。", tags: ["极致颜控", "极度依赖", "慢热型"], analysis: "你是一个极致的颜控和浪漫主义者，对美有着敏锐的直觉。虽然面对陌生人有些高冷，但对认定的朋友有着极强的依恋。" },
      "ESTP": { breed: "奶牛猫", imgName: "cat_ESTP.jpg", prefix: "永远在挑战极限的", quote: "那个花瓶看起来很好推，我试一下！", tags: ["冒险家", "绝不内耗", "全场气氛组"], analysis: "奶牛猫是出了名的冒险家。你的字典里没有内耗，每天都充满着用不完的精力。你是能在关键时刻带给大家无数欢乐的活宝。" },
      "ESFP": { breed: "德文卷毛猫", imgName: "cat_ESFP.jpg", prefix: "天生热爱舞台的", quote: "快看我！快看我！我翻跟头了！", tags: ["天生戏精", "快乐至上", "聚光灯体质"], analysis: "你天生热爱舞台，渴望被关注，有你在的地方绝对不会冷场。你的快乐极具传染力，是个百分百的“活在当下”大师。" },
      "INFJ": { breed: "布偶猫", imgName: "cat_INFJ.jpg", prefix: "敏锐察觉一切情绪的", quote: "你今天好像不太开心，我来陪你。", tags: ["精神洁癖", "情绪海绵", "极致温柔"], analysis: "你有着极强的共情能力，能敏锐察觉到别人没说出口的情绪。你渴望深刻的灵魂共鸣，温柔对待世界。" },
      "INFP": { breed: "波斯猫", imgName: "cat_INFP.jpg", prefix: "内心戏极其丰富的", quote: "今天窗外的落叶，好像在诉说离别。", tags: ["多愁善感", "和平主义", "重度精神内耗"], analysis: "波斯猫就像一位安静的哲学家。你对世界充满了善意，有着庞大的精神宇宙。你极其讨厌冲突，是个温柔的小天使。" },
      "ENFJ": { breed: "缅因猫", imgName: "cat_ENFJ.jpg", prefix: "充满无限保护欲的", quote: "别怕，站到我身后去。", tags: ["温柔霸总", "知心大哥", "天生利他"], analysis: "你是团队里天生的灵魂人物，充满了强烈的保护欲。你愿意为了在乎的人遮风挡雨，是大家最坚实的后盾。" },
      "ENFP": { breed: "三花猫", imgName: "cat_ENFP.jpg", prefix: "每天脑洞大开的", quote: "快看那个纸团！那是通往异世界的钥匙！", tags: ["重度自来熟", "情绪感染力MAX", "三分钟热度"], analysis: "你拥有无穷无尽的好奇心，能瞬间点燃气氛。你真诚热烈的灵魂，是所有人生活中的一抹亮色。" },
      "INTJ": { breed: "俄罗斯蓝猫", imgName: "cat_INTJ.jpg", prefix: "早已看穿一切的", quote: "人类的愚蠢，有时真让人无奈。", tags: ["高冷神秘", "逻辑严密", "深度独立"], analysis: "你是冷静的观察者，更喜欢待在安全距离外审视世界，追求高效和逻辑。但对“自己人”会展现出毫无保留的忠诚。" },
      "INTP": { breed: "英国短毛猫", imgName: "cat_INTP.jpg", prefix: "能躺着绝不站着的", quote: "思考猫生太累了，先睡一觉再说。", tags: ["深度社恐", "极度佛系", "精神内核稳"], analysis: "比起外界的喧嚣，你更享受独自思考的时光。对世界底层逻辑充满好奇，但一旦要付诸行动，通常会选择继续躺平。" },
      "ENTP": { breed: "暹罗猫", imgName: "cat_ENTP.jpg", prefix: "不按套路出牌的", quote: "我就推一下这个杯子，看你有什么反应。", tags: ["极度话痨", "好奇心爆棚", "灵魂有趣"], analysis: "你思维极其敏捷，好奇心爆棚，对什么都要问个为什么。你不按套路出牌，灵魂极度有趣。" },
      "ENTJ": { breed: "孟加拉豹猫", imgName: "cat_ENTJ.jpg", prefix: "从不掩饰野心的", quote: "整座房子，都是我的巡视领地。", tags: ["天生王者", "行动派", "极度自信"], analysis: "你自带让人臣服的狂野气场。有着极强的目标感、野心和执行力，遇到问题迅速寻找最优解并雷厉风行地执行。" },
      "DEFAULT": { breed: "灰白曼基康", imgName: "cat_DEFAULT.jpg", prefix: "特立独行无法定义的", quote: "我的心思，你别猜。", tags: ["极具个性", "不按套路出牌", "内心强大"], analysis: "你是一个矛盾又迷人的结合体。你不喜欢被世俗标签定义，有着自己独特的节奏和评价体系，最重要的是体验当下。" }
    };

    let currentIdx = 0;
    let tempSelectedIndex = -1;
    let history = [];
    let isAnimating = false;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0); 
    }

    function startGame() {
        currentIdx = 0; tempSelectedIndex = -1; history = [];
        switchScreen('screen-quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentIdx];
        document.getElementById('progress-text').innerText = `🐾 正在探索 ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-content').innerText = qData.q;
        
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        qData.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-hand-drawn' + (tempSelectedIndex === index ? ' selected' : '');
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(index);
            list.appendChild(btn);
        });

        // 控制底部按钮状态
        document.getElementById('back-btn').style.display = currentIdx > 0 ? 'block' : 'none';
        document.getElementById('spacer').style.display = currentIdx === 0 ? 'block' : 'none';
        
        const confirmBtn = document.getElementById('confirm-btn');
        if (tempSelectedIndex === -1) {
            confirmBtn.classList.add('disabled');
        } else {
            confirmBtn.classList.remove('disabled');
        }
    }

    function selectOption(index) {
        if (isAnimating) return;
        tempSelectedIndex = index;
        renderQuestion(); // 重新渲染以更新按钮样式
    }

    function confirmAnswer() {
        if (tempSelectedIndex === -1 || isAnimating) return;
        isAnimating = true;

        history[currentIdx] = tempSelectedIndex;

        const animWrap = document.getElementById('quiz-anim-wrap');
        animWrap.classList.remove('page-turn-in');
        animWrap.classList.add('page-turn-out');

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < questions.length) {
                tempSelectedIndex = history[currentIdx] !== undefined ? history[currentIdx] : -1;
                renderQuestion();
                animWrap.classList.remove('page-turn-out');
                animWrap.classList.add('page-turn-in');
                setTimeout(() => { isAnimating = false; }, 400);
            } else {
                calcResult();
            }
        }, 300);
    }

    function prevQuestion() {
        if (currentIdx === 0 || isAnimating) return;
        isAnimating = true;

        const animWrap = document.getElementById('quiz-anim-wrap');
        animWrap.classList.remove('page-turn-in');
        animWrap.classList.add('page-turn-out');

        setTimeout(() => {
            currentIdx--;
            tempSelectedIndex = history[currentIdx] !== undefined ? history[currentIdx] : -1;
            renderQuestion();
            animWrap.classList.remove('page-turn-out');
            animWrap.classList.add('page-turn-in');
            setTimeout(() => { isAnimating = false; }, 400);
        }, 300);
    }

    function calcResult() {
        switchScreen('screen-loading');
        let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
        
        history.forEach((optIndex, qIndex) => {
            const option = questions[qIndex].a[optIndex];
            if (option && option.s) {
                for (let k in option.s) { scores[k] += option.s[k]; }
            }
        });

        const EI = scores.E >= scores.I ? 'E' : 'I';
        const SN = scores.S >= scores.N ? 'S' : 'N';
        const TF = scores.T >= scores.F ? 'T' : 'F';
        const JP = scores.J >= scores.P ? 'J' : 'P';
        const mbti = EI + SN + TF + JP;

        const res = resultData[mbti] || resultData["DEFAULT"];

        setTimeout(() => {
            document.getElementById('res-prefix').innerText = res.prefix;
            document.getElementById('res-breed').innerText = res.breed;
            document.getElementById('res-quote').innerText = `“${res.quote}”`;
            document.getElementById('res-analysis').innerText = res.analysis;
            
            const tagsDiv = document.getElementById('res-tags');
            tagsDiv.innerHTML = '';
            res.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = 'tag-doodle';
                span.innerText = t;
                tagsDiv.appendChild(span);
            });

            const artImg = document.getElementById('cat-artwork');
            const placeholder = document.getElementById('placeholder-box');
            artImg.src = `./${res.imgName}`; 
            
            artImg.onload = () => { artImg.style.display = 'block'; placeholder.style.display = 'none'; };
            artImg.onerror = () => { placeholder.innerHTML = `<span style="font-size: 30px; margin-bottom: 10px;">😿</span><br><span style="font-size:14px">[ 画师还没画完 ${res.imgName} ]</span>`; }

            switchScreen('screen-result');
        }, 1500); 
    }
</script>
</body>
