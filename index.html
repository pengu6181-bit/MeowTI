<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeowTI 喵格测试 - 手机专属版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        /* ================= 绘本风格 & 色彩 ================= */
        :root {
            --paper-bg: #FDFBF7; 
            --ink-black: #4a4848; 
            --crayon-red: #ff7878; 
            --crayon-blue: #7bb5d1; 
            --crayon-yellow: #fddb73;
        }

        * { 
            box-sizing: border-box; 
            /* 【优化2】彻底清除手机端点击时自带的半透明蓝色闪烁方块 */
            -webkit-tap-highlight-color: transparent; 
            /* 【优化3】禁止用户长按选中文字，提升类似App的操作手感 */
            user-select: none; 
            -webkit-user-select: none;
        }

        body {
            background-color: var(--paper-bg);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
                radial-gradient(#e5e0d8 1px, transparent 1px);
            background-size: 30px 30px, 30px 30px, 15px 15px;
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive, sans-serif;
            color: var(--ink-black);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* 适配苹果手机底部的安全距离 */
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        /* 背景动态漂浮物 */
        .bg-decor { position: fixed; font-size: 30px; opacity: 0.15; z-index: 0; pointer-events: none; filter: sepia(0.5) hue-rotate(-10deg); }
        .decor-1 { top: 10%; left: 5%; animation: float 6s ease-in-out infinite; }
        .decor-2 { bottom: 20%; right: 5%; animation: float 8s ease-in-out infinite reverse; }
        .decor-3 { top: 40%; right: 10%; animation: float 7s ease-in-out infinite; transform: rotate(15deg); }
        .decor-4 { bottom: 10%; left: 15%; animation: float 5s ease-in-out infinite reverse; font-size: 40px; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }

        /* 主容器 */
        .notebook-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            padding: 30px 20px 40px 20px;
            position: relative;
            z-index: 1;
            background: rgba(253, 251, 247, 0.7);
            backdrop-filter: blur(2px);
            /* 【优化4】隐藏手机端的垂直滚动条，让页面更干净 */
            scrollbar-width: none; 
        }
        .notebook-container::-webkit-scrollbar { display: none; }

        .screen { display: none; animation: wobbleIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .screen.active { display: block; }
        @keyframes wobbleIn { 
            0% { opacity: 0; transform: translateY(15px) rotate(-2deg); } 
            100% { opacity: 1; transform: translateY(0) rotate(0); } 
        }

        /* 标题和排版 */
        .title-handwritten { font-size: 40px; text-align: center; margin-bottom: 25px; position: relative; display: inline-block; }
        .title-handwritten::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 8px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 10" preserveAspectRatio="none"><path d="M0,5 Q25,0 50,5 T100,5" fill="none" stroke="%23ff7878" stroke-width="3"/></svg>') repeat-x;
            background-size: 40px 10px;
        }

        .progress-doodle { font-size: 16px; text-align: center; margin-bottom: 25px; color: var(--crayon-blue); border-bottom: 2px dashed #ddd; padding-bottom: 10px;}
        .question-text { font-size: 22px; line-height: 1.5; margin-bottom: 30px; }

        /* 【优化5】手机专属按钮交互逻辑 */
        .btn-hand-drawn {
            display: block; width: 100%; padding: 16px 20px 16px 30px; margin-bottom: 16px;
            background-color: transparent;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            border: 3px solid var(--ink-black);
            cursor: pointer; font-family: inherit; font-size: 17px; color: var(--ink-black);
            text-align: left; position: relative;
            /* 优化过渡动画，让手机点击反馈更敏捷 */
            transition: transform 0.1s ease, background-color 0.1s ease, padding-left 0.1s ease;
            touch-action: manipulation; /* 提升手机端点击响应速度 */
        }

        .btn-hand-drawn::before {
            content: '🐾'; position: absolute; left: 8px; top: 15px; opacity: 0;
            transform: scale(0.5); transition: all 0.1s ease; font-size: 16px;
        }

        /* 区分 PC 端 hover 和 手机端 active (按压) */
        @media (hover: hover) and (pointer: fine) {
            /* 只有用鼠标的 PC 端才触发 hover，防止手机端出现颜色残留 */
            .btn-hand-drawn:hover { background-color: var(--crayon-yellow); transform: scale(1.02) rotate(-1deg); padding-left: 35px; }
            .btn-hand-drawn:hover::before { opacity: 1; transform: scale(1); }
        }

        /* 手机端用户的手指按压下去的瞬间触发 active */
        .btn-hand-drawn:active {
            background-color: var(--crayon-yellow); 
            /* 手机上点击采用“按下去(缩小)”的反馈，更有手感 */
            transform: scale(0.96) rotate(-1deg) !important; 
            padding-left: 35px;
        }
        .btn-hand-drawn:active::before { opacity: 1; transform: scale(1); }

        /* 主按钮 */
        .btn-primary-doodle {
            background-color: var(--crayon-red); color: white; text-align: center;
            border-color: var(--crayon-red); font-size: 20px; margin-top: 30px; padding-left: 20px;
            transform: rotate(-1deg); box-shadow: 3px 3px 0px rgba(0,0,0,0.15);
            justify-content: center;
        }
        .btn-primary-doodle::before { display: none; }
        .btn-primary-doodle:active { background-color: #e56060; transform: scale(0.95) rotate(1deg) !important; padding-left: 20px; box-shadow: 1px 1px 0px rgba(0,0,0,0.15);}

        /* 结果页 */
        .polaroid-frame { background: white; padding: 12px 12px 30px 12px; box-shadow: 2px 5px 15px rgba(0,0,0,0.08); transform: rotate(2deg); margin-bottom: 30px; position: relative; }
        .washi-tape { position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg); width: 100px; height: 30px; background-color: rgba(123, 181, 209, 0.5); z-index: 10; border-left: 2px dotted rgba(255,255,255,0.5); border-right: 2px dotted rgba(255,255,255,0.5); }
        
        .art-placeholder { width: 100%; aspect-ratio: 1/1; background-color: #f9f8f6; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ddd; color: #aaa; margin-bottom: 15px; border-radius: 8px; }
        .final-cat-art { width: 100%; height: auto; display: none; border-radius: 8px; margin-bottom: 15px; }

        .meta-prefix { font-size: 18px; color: var(--crayon-blue); text-align: center; }
        .meta-breed { font-size: 38px; margin: 5px 0; color: var(--crayon-red); text-shadow: 2px 2px 0px rgba(0,0,0,0.05); text-align: center; }

        .doodle-box { border: 3px solid var(--ink-black); border-radius: 15px 225px 255px 15px/255px 15px 225px 15px; padding: 20px 15px; margin-bottom: 25px; background: rgba(255,255,255,0.7); position: relative; }
        .doodle-box::after { content: '🐟'; position: absolute; right: -5px; bottom: -15px; font-size: 26px; transform: rotate(-20deg); }
        
        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;}
        .tag-doodle { border: 2px solid var(--ink-black); padding: 5px 12px; border-radius: 20px; font-size: 14px; background: var(--paper-bg); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .tag-doodle:nth-child(odd) { transform: rotate(-2deg); background: var(--crayon-yellow); }
        .tag-doodle:nth-child(even) { transform: rotate(2deg); }

        .analysis-text { font-size: 16px; line-height: 1.7; color: #444; padding: 0 5px; text-align: justify; }

        /* 动画加载页 */
        #loading-doodle { text-align: center; padding-top: 40%; font-size: 20px; }
        .cat-loading-anim { font-size: 45px; display: flex; justify-content: center; gap: 15px; margin-bottom: 15px;}
        .cat-run { animation: chase 1s infinite linear; }
        .yarn-roll { animation: roll 1s infinite linear; }
        @keyframes chase { 0% { transform: translateY(0); } 50% { transform: translateY(-12px) rotate(5deg); } 100% { transform: translateY(0); } }
        @keyframes roll { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(15px) rotate(180deg); } 100% { transform: translateX(0) rotate(360deg); } }

        /* 【优化6】针对特别小的手机屏幕 (如 iPhone SE) 进行微调 */
        @media screen and (max-width: 380px) {
            .title-handwritten { font-size: 34px; }
            .btn-hand-drawn { padding: 14px 15px 14px 25px; font-size: 15px; }
            .btn-hand-drawn::before { top: 12px; left: 5px; }
            .meta-breed { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="bg-decor decor-1">🐾</div>
<div class="bg-decor decor-2">🧶</div>
<div class="bg-decor decor-3">🐟</div>
<div class="bg-decor decor-4">🐈</div>

<div class="notebook-container">
    
    <div id="screen-home" class="screen active" style="text-align: center; padding-top: 10%;">
        <img src="./home_cat.png" alt="首页猫咪" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; margin: 0 auto 20px auto; display: block; animation: float 4s infinite; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 class="title-handwritten">MeowTI<br>喵格测试</h1>
        <p style="font-size: 16px; margin-bottom: 40px; color: var(--text-second); font-weight: bold;">哪只小猫咪，画出了你的灵魂？</p>
        <button class="btn-hand-drawn btn-primary-doodle" onclick="startGame()">翻开日记本开始 🐾</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="progress-doodle" id="progress-text">🐾 正在探索 1 / 15</div>
        <div class="question-text" id="question-content">题目加载中...</div>
        <div id="options-list"></div>
    </div>

    <div id="screen-loading" class="screen">
        <div id="loading-doodle">
            <div class="cat-loading-anim">
                <div class="cat-run">🐈</div>
                <div class="yarn-roll">🧶</div>
            </div>
            正在用蜡笔画出你的喵格...
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="polaroid-frame">
            <div class="washi-tape"></div> 
            
            <div class="art-placeholder" id="placeholder-box">
                <span style="font-size: 35px; margin-bottom: 10px;">🖌️</span>
                [ 美工作品展示区 ]
            </div>
            <img class="final-cat-art" id="cat-artwork" src="" alt="专属喵格">
            
            <div class="meta-prefix" id="res-prefix">称号加载中</div>
            <h1 class="meta-breed" id="res-breed">品种名</h1>
        </div>

        <div class="doodle-box">
            <div style="color: var(--crayon-red); font-size: 15px; margin-bottom: 8px; font-weight: bold;">「 喵言喵语 」</div>
            <p id="res-quote" style="font-size: 18px; font-weight: bold; margin: 0;">“金句加载中”</p>
        </div>

        <div class="tags-wrapper" id="res-tags"></div>
        <div class="analysis-text" id="res-analysis">解析文案加载中...</div>

        <button class="btn-hand-drawn btn-primary-doodle" onclick="location.reload()" style="margin-top: 35px;">再画一只 🖍️</button>
    </div>
</div>

<script>
    // 题目数组（请根据之前的设定补齐所有题目）
    const questions = [
        // E/I 维度
        { q: "清晨，主人的闹钟响了但他没醒，你会：", a: [
            { t: "直接踩在他脸上，大声喵喵叫催开饭", s: {E:2} },
            { t: "跳上床，用头温柔地蹭他的手", s: {E:1} },
            { t: "坐在门口静静盯着他，等他自己醒", s: {I:1} },
            { t: "换个姿势继续睡，他起不起关我什么事", s: {I:2} }
        ]},
        { q: "家里来了几个陌生人做客，你会：", a: [
            { t: "立刻冲出去蹭腿，成为全场焦点", s: {E:2} },
            { t: "暗中观察一会儿，找个顺眼的人求摸", s: {E:1} },
            { t: "趴在冰箱高处冷眼旁观", s: {I:1} },
            { t: "瞬间消失在床底，客人不走绝不出现", s: {I:2} }
        ]},
        { q: "如果你突然学会了说话，你最想说：", a: [
            { t: "“带我出去溜溜！外面的世界好精彩！”", s: {E:2} },
            { t: "“快拿逗猫棒过来，陪我玩半小时。”", s: {E:1} },
            { t: "“别老动手动脚，保持礼貌距离。”", s: {I:1} },
            { t: "“只要你在家，咱俩各玩各的就挺好。”", s: {I:2} }
        ]},
        // S/N 维度
        { q: "墙角突然出现一个红点（激光笔），你认为：", a: [
            { t: "绝对是猎物！我的身体已经本能扑出了", s: {S:2} },
            { t: "是个好玩的玩具，先观察它的规律", s: {S:1} },
            { t: "人类的一种低级把戏，但我愿意配合", s: {N:1} },
            { t: "抓不住的光？这是存在与虚无的哲学", s: {N:2} }
        ]},
        { q: "主人买了个超大猫爬架，你的反应：", a: [
            { t: "抓挠几下测试材质，看看稳不稳", s: {S:2} },
            { t: "到处闻闻，熟悉一下新气味", s: {S:1} },
            { t: "想象自己站在最高点俯视众生的样子", s: {N:1} },
            { t: "相比爬架，我更喜欢装爬架的纸箱", s: {N:2} }
        ]},
        { q: "凝视窗外落叶时，你在想：", a: [
            { t: "那片叶子很好扑，我要练习下伏击", s: {S:2} },
            { t: "天变凉了，今天要在暖气片旁边睡", s: {S:1} },
            { t: "每一片落叶都是四季轮回的故事", s: {N:1} },
            { t: "如果我也能像叶子一样飞，会去哪？", s: {N:2} }
        ]},
        // T/F 维度
        { q: "主人因为工作不顺在哭，你会：", a: [
            { t: "把他的笔推下桌，让他动起来去捡", s: {T:2} },
            { t: "叼来一个玩具，试图帮他转移注意力", s: {T:1} },
            { t: "默默靠在他身边，用尾巴扫扫他的手", s: {F:1} },
            { t: "发出呼噜声并舔他的眼泪，满眼心疼", s: {F:2} }
        ]},
        { q: "新来的猫抢了你的垫子，你会：", a: [
            { t: "武力压制！一巴掌确立家庭地位", s: {T:2} },
            { t: "找主人抗议，利用规则解决争端", s: {T:1} },
            { t: "感到很委屈，躲在角落哈气表达不满", s: {F:1} },
            { t: "算啦，看它那么小，让给它睡好了", s: {F:2} }
        ]},
        { q: "关于“偷吃桌上的肉”，你的逻辑：", a: [
            { t: "只要我动作够快，没被抓到就不算偷", s: {T:2} },
            { t: "计算被抓概率和挨骂成本后再决定", s: {T:1} },
            { t: "如果我吃了，主人会不会对我失望？", s: {F:1} },
            { t: "肉在呼唤我，这是灵魂深处的吸引", s: {F:2} }
        ]},
        // J/P 维度
        { q: "关于猫砂盆的卫生，你要求：", a: [
            { t: "必须一尘不染！否则我绝不进去", s: {J:2} },
            { t: "勉强干净就行，我喜欢把砂刨整齐", s: {J:1} },
            { t: "看心情，今天心情好就埋，不好就不埋", s: {P:1} },
            { t: "随心所欲，主人的花盆也可以是厕所", s: {P:2} }
        ]},
        { q: "当你决定抓一只苍蝇时，你会：", a: [
            { t: "耐心潜伏，预判轨迹，力求一击必杀", s: {J:2} },
            { t: "顺着平时巡逻路线，顺手挥一爪", s: {J:1} },
            { t: "看到了就挥两爪，没抓到就算了继续睡", s: {P:1} },
            { t: "兴奋地满屋子乱跑，撞倒花瓶也不管", s: {P:2} }
        ]},
        { q: "对于明天的生活安排：", a: [
            { t: "计划通：7点要饭，14点午休", s: {J:2} },
            { t: "只要按时开罐头，生活就该有序", s: {J:1} },
            { t: "看心情，也许拆家，也许发呆", s: {P:1} },
            { t: "我是一阵风，随蝴蝶的脚步而活", s: {P:2} }
        ]},
        // 杂项补充
        { q: "你最喜欢的猫咪社交方式是：", a: [
            { t: "碰鼻礼，直接了当的打招呼", s: {E:1, T:1} },
            { t: "躲在后面悄悄闻对方的味道", s: {I:1, S:1} },
            { t: "疯狂追逐打闹，以此建立友谊", s: {E:1, P:1} },
            { t: "互相舔毛，温馨的亲密接触", s: {F:1, J:1} }
        ]},
        { q: "如果你是一只流浪猫，你会选择住：", a: [
            { t: "繁忙的咖啡馆门口，可以看形形色色的人", s: {E:1} },
            { t: "安静的书店角落，充满书卷气", s: {I:1, N:1} },
            { t: "菜市场肉摊附近，生活有保障", s: {S:1} },
            { t: "城市屋顶，可以俯瞰整座城", s: {N:1} }
        ]},
        // 背景色选择 (Q15)
        { q: "最后，为你的画像选一个背景底色：", a: [
            { t: "温柔香芋紫", attr: {bg: "#d1c4e9"} },
            { t: "治愈奶油黄", attr: {bg: "#fff9c4"} },
            { t: "活泼脏粉色", attr: {bg: "#ffcdd2"} },
            { t: "冷酷莫兰迪灰", attr: {bg: "#cfd8dc"} }
        ]}
    ];

    // 16型猫咪数据（请确保这里录入完整）
    const resultData = {
        // --- 守护者阵营 (SJ) ---
        "ISTJ": { 
            breed: "中华狸花猫", 
            prefix: "干饭第一名的", 
            subtitle: "极其靠谱的规则守护者", 
            quote: "少废话，把今天的罐头交出来。", 
            tags: ["务实机警", "拒绝内耗", "执行力爆表"], 
            analysis: "狸花猫是天生的生存专家。你极其务实，不搞虚头巴脑的那一套。在生活中，你有着自己严格的章法和节奏，做事利落，执行力极强。你可能不太擅长表达甜言蜜语，但你会用最实际的行动来证明你的靠谱。" 
        },
        "ISFJ": { 
            breed: "异国短毛猫", 
            prefix: "默默记住你喜好的", 
            subtitle: "世界上最温柔的守护者", 
            quote: "你没说，但我记得你上次提过。", 
            tags: ["生日不会忘", "情绪极其稳定", "体贴细节控"], 
            analysis: "你就像加菲猫一样憨厚呆萌，但骨子里是一部超级细致的人际记录仪。你记得身边人所有的喜好和忌口，把照顾别人当成一种本能。你做的很多琐碎小事可能没人注意，但那并不影响你继续默默散发温暖。" 
        },
        "ESTJ": { 
            breed: "东方短毛猫", 
            prefix: "绝对掌控全局的", 
            subtitle: "气场一米八的效率狂人",

    let currentIdx = 0;
    let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // 【优化7】每次切换屏幕时，自动滚动到顶部，防止页面停留在半中央
        window.scrollTo(0, 0); 
    }

    function startGame() {
        switchScreen('screen-quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentIdx];
        document.getElementById('progress-text').innerText = `🐾 正在探索 ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-content').innerText = qData.q;
        
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        qData.a.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-hand-drawn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                // 【优化8】延迟跳转，让用户看清自己手指点下去的按钮反馈（0.15秒）
                setTimeout(() => {
                    if (opt.s) { for (let k in opt.s) scores[k] += opt.s[k]; }
                    currentIdx++;
                    if (currentIdx < questions.length) renderQuestion();
                    else calcResult();
                }, 150);
            };
            list.appendChild(btn);
        });
    }

    function calcResult() {
        switchScreen('screen-loading');

        const EI = scores.E >= scores.I ? 'E' : 'I';
        const SN = scores.S >= scores.N ? 'S' : 'N';
        const TF = scores.T >= scores.F ? 'T' : 'F';
        const JP = scores.J >= scores.P ? 'J' : 'P';
        const mbti = EI + SN + TF + JP;

        setTimeout(() => {
            const res = resultData[mbti] || resultData["DEFAULT"];

            document.getElementById('res-prefix').innerText = res.prefix;
            document.getElementById('res-breed').innerText = res.breed;
            document.getElementById('res-quote').innerText = `“${res.quote}”`;
            document.getElementById('res-analysis').innerText = res.analysis;
            
            const tagsDiv = document.getElementById('res-tags');
            tagsDiv.innerHTML = '';
            res.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = 'tag-doodle';
                span.innerText = t;
                tagsDiv.appendChild(span);
            });

            const artImg = document.getElementById('cat-artwork');
            const placeholder = document.getElementById('placeholder-box');
            
            artImg.src = `./${res.imgName}`; 
            
            artImg.onload = () => {
                artImg.style.display = 'block';
                placeholder.style.display = 'none';
            };
            artImg.onerror = () => {
                placeholder.innerHTML = `<span style="font-size: 30px; margin-bottom: 10px;">😿</span><br><span style="font-size:14px">[ 画师还没画完 ${res.imgName} ]</span>`;
            }

            switchScreen('screen-result');
        }, 1500); 
    }
